<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Reading History - Little Leopard</title>
  <link rel="stylesheet" href="assets/popup.css">
  <style>
    body {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #FFF8E1 0%, #F1C27D 100%);
    }

    .history-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .history-header {
      background: linear-gradient(145deg, #D4A017, #B8860B);
      padding: 30px;
      text-align: center;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(212, 160, 23, 0.3);
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }

    .history-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20px 20px, rgba(91,58,41,0.15) 3px, transparent 0) repeat;
      background-size: 50px 50px;
      pointer-events: none;
    }

    .history-header h1 {
      position: relative;
      font-size: 32px;
      color: #5B3A29;
      margin: 0 0 10px 0;
      text-shadow: 0 2px 8px rgba(255, 255, 255, 0.5);
      z-index: 1;
    }

    .history-header p {
      position: relative;
      color: rgba(91, 58, 41, 0.8);
      font-size: 14px;
      margin: 0;
      z-index: 1;
    }

    .history-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .stat-number {
      font-size: 48px;
      font-weight: bold;
      color: #D4A017;
      margin-bottom: 10px;
    }

    .stat-label {
      font-size: 14px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .history-controls {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .control-row {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .control-row:last-child {
      margin-bottom: 0;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      padding: 12px 18px;
      border: 2px solid rgba(212, 160, 23, 0.3);
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .search-box:focus {
      outline: none;
      border-color: #D4A017;
      box-shadow: 0 2px 12px rgba(212, 160, 23, 0.2);
    }

    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-button {
      padding: 10px 20px;
      background: rgba(212, 160, 23, 0.1);
      border: 2px solid transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #5B3A29;
    }

    .filter-button:hover {
      background: rgba(212, 160, 23, 0.2);
    }

    .filter-button.active {
      background: #D4A017;
      color: white;
      border-color: #B8860B;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: white;
    }

    .action-btn.primary {
      background: linear-gradient(145deg, #4CAF50, #45A049);
    }

    .action-btn.primary:hover {
      background: linear-gradient(145deg, #5CB85F, #4CAF50);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }

    .action-btn.danger {
      background: linear-gradient(145deg, #FF6B6B, #EE5A52);
    }

    .action-btn.danger:hover {
      background: linear-gradient(145deg, #FF7979, #FF6B6B);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
    }

    .markers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 20px;
    }

    .marker-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      border-left: 5px solid;
      animation: fadeInCard 0.3s ease;
    }

    @keyframes fadeInCard {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .marker-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .marker-card.type-learned {
      border-left-color: #FFF176;
    }

    .marker-card.type-question {
      border-left-color: #FF6B6B;
    }

    .marker-card.type-strikethrough {
      border-left-color: #999999;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .card-type-badge {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(212, 160, 23, 0.15);
      color: #5B3A29;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .card-action-btn {
      background: rgba(91, 58, 41, 0.1);
      border: none;
      color: #5B3A29;
      font-size: 18px;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-action-btn:hover {
      background: rgba(212, 160, 23, 0.3);
      transform: scale(1.1);
    }

    .card-action-btn.delete:hover {
      background: rgba(255, 107, 107, 0.2);
      color: #FF6B6B;
    }

    .card-text {
      font-size: 15px;
      line-height: 1.6;
      color: #5B3A29;
      margin-bottom: 15px;
      padding: 15px;
      background: rgba(212, 160, 23, 0.05);
      border-radius: 8px;
      font-weight: 500;
    }

    .card-text.strikethrough {
      text-decoration: line-through;
      text-decoration-color: #FF6B6B;
      text-decoration-thickness: 2px;
      opacity: 0.7;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(91, 58, 41, 0.1);
      font-size: 12px;
      color: #999;
    }

    .card-url {
      display: flex;
      align-items: center;
      gap: 5px;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-url a {
      color: #D4A017;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .card-url a:hover {
      color: #B8860B;
      text-decoration: underline;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    .empty-state h3 {
      font-size: 24px;
      color: #5B3A29;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      padding: 60px;
      font-size: 18px;
      color: #999;
    }

    .url-group {
      margin-bottom: 40px;
    }

    .url-group-header {
      background: linear-gradient(90deg, rgba(212, 160, 23, 0.2), rgba(212, 160, 23, 0.05));
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .url-group-title {
      font-size: 16px;
      font-weight: 600;
      color: #5B3A29;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .url-group-count {
      background: rgba(212, 160, 23, 0.3);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    input[type="file"] {
      display: none;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: #5B3A29;
    }

    .toggle-label input[type="checkbox"] {
      cursor: pointer;
      accent-color: #D4A017;
    }

    .url-link-btn {
      background: none;
      border: none;
      color: #D4A017;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      text-decoration: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .url-link-btn:hover {
      color: #B8860B;
      text-decoration: underline;
    }

    .card-action-btn.link-btn {
      transition: all 0.2s ease;
    }

    .card-action-btn.link-btn:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="history-container">
    <!-- Header -->
    <div class="history-header">
      <h1>📚 Reading Markers History</h1>
      <p>All your learning highlights in one place</p>
    </div>

    <!-- Statistics -->
    <div class="history-stats">
      <div class="stat-card">
        <div class="stat-number" id="totalCount">0</div>
        <div class="stat-label">Total Markers</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="learnedCount">0</div>
        <div class="stat-label">💡 Learned</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="questionCount">0</div>
        <div class="stat-label">❓ Questions</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="deleteCount">0</div>
        <div class="stat-label">✂️ Skipped</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="history-controls">
      <div class="control-row">
        <input 
          type="text" 
          id="searchInput" 
          class="search-box" 
          placeholder="🔍 Search markers by content, URL, or note..."
        />
      </div>
      
      <div class="control-row">
        <div class="filter-group">
          <button class="filter-button active" data-filter="all">All</button>
          <button class="filter-button" data-filter="learned">💡 Learned</button>
          <button class="filter-button" data-filter="question">❓ Questions</button>
          <button class="filter-button" data-filter="strikethrough">✂️ Skipped</button>
        </div>

        <label class="toggle-label">
          <input type="checkbox" id="groupByUrlCheckbox" checked>
          <span>📑 Group by URL</span>
        </label>

        <div class="action-buttons" style="margin-left: auto;">
          <button class="action-btn primary" id="exportMarkdownBtn">💾 Export MD</button>
          <button class="action-btn primary" id="exportJsonBtn">📦 Export JSON</button>
          <button class="action-btn primary" id="importJsonBtn">📥 Import</button>
          <button class="action-btn danger" id="clearAllBtn">🗑️ Clear All</button>
        </div>
      </div>
    </div>

    <!-- Markers Display -->
    <div id="markersContainer">
      <div class="loading">Loading markers...</div>
    </div>
  </div>

  <input type="file" id="importFileInput" accept=".json">

  <script src="scripts/terminology.js"></script>
  <script>
    // Marker History Manager
    class HistoryManager {
      constructor() {
        this.markers = [];
        this.currentFilter = 'all';
        this.currentSearch = '';
        this.groupByUrl = true;
        this.init();
      }

      async init() {
        await this.loadMarkers();
        this.setupEventListeners();
        this.updateStats();
        this.renderMarkers();
      }

      async loadMarkers() {
        return new Promise((resolve) => {
          chrome.storage.sync.get(['markers'], (result) => {
            this.markers = result.markers || [];
            resolve();
          });
        });
      }

      setupEventListeners() {
        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
          this.currentSearch = e.target.value.toLowerCase();
          this.renderMarkers();
        });

        // Filter buttons
        document.querySelectorAll('.filter-button').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.currentFilter = btn.dataset.filter;
            this.renderMarkers();
          });
        });

        // Group by URL toggle
        document.getElementById('groupByUrlCheckbox').addEventListener('change', (e) => {
          this.groupByUrl = e.target.checked;
          this.renderMarkers();
        });

        // Export Markdown
        document.getElementById('exportMarkdownBtn').addEventListener('click', () => {
          this.exportToMarkdown();
        });

        // Export JSON
        document.getElementById('exportJsonBtn').addEventListener('click', () => {
          this.exportToJSON();
        });

        // Import JSON
        document.getElementById('importJsonBtn').addEventListener('click', () => {
          document.getElementById('importFileInput').click();
        });

        document.getElementById('importFileInput').addEventListener('change', (e) => {
          this.importFromJSON(e.target.files[0]);
        });

        // Clear All
        document.getElementById('clearAllBtn').addEventListener('click', () => {
          if (confirm('Are you sure you want to delete all markers? This cannot be undone!')) {
            this.clearAll();
          }
        });
      }

      updateStats() {
        const total = this.markers.length;
        const learned = this.markers.filter(m => m.type === 'learned' || m.type === 'highlight' || m.type === 'important').length;
        const question = this.markers.filter(m => m.type === 'question').length;
        const deleted = this.markers.filter(m => m.type === 'strikethrough').length;

        document.getElementById('totalCount').textContent = total;
        document.getElementById('learnedCount').textContent = learned;
        document.getElementById('questionCount').textContent = question;
        document.getElementById('deleteCount').textContent = deleted;
      }

      getFilteredMarkers() {
        let filtered = this.markers;

        // Apply type filter
        if (this.currentFilter !== 'all') {
          filtered = filtered.filter(m => m.type === this.currentFilter);
        }

        // Apply search filter
        if (this.currentSearch) {
          filtered = filtered.filter(m => 
            m.text.toLowerCase().includes(this.currentSearch) ||
            (m.note && m.note.toLowerCase().includes(this.currentSearch)) ||
            (m.url && m.url.toLowerCase().includes(this.currentSearch))
          );
        }

        return filtered;
      }

      groupMarkersByUrl(markers) {
        const grouped = {};
        markers.forEach(marker => {
          const url = marker.url || 'Unknown Source';
          if (!grouped[url]) {
            grouped[url] = [];
          }
          grouped[url].push(marker);
        });
        return grouped;
      }

      renderMarkers() {
        const container = document.getElementById('markersContainer');
        const filtered = this.getFilteredMarkers();

        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📚</div>
              <h3>${this.currentSearch ? 'No matching markers found' : 'No markers yet'}</h3>
              <p>${this.currentSearch ? 'Try a different search term' : 'Start marking important text while reading!'}</p>
            </div>
          `;
          return;
        }

        if (this.groupByUrl) {
          const grouped = this.groupMarkersByUrl(filtered);
          container.innerHTML = Object.entries(grouped).map(([url, markers]) => {
            const hostname = url !== 'Unknown Source' ? new URL(url).hostname : 'Unknown Source';
            return `
              <div class="url-group">
                <div class="url-group-header">
                  <div class="url-group-title">
                    🌐 ${hostname}
                    <span class="url-group-count">${markers.length}</span>
                  </div>
                  ${url !== 'Unknown Source' ? `<a href="${url}" target="_blank" style="text-decoration: none; font-size: 20px;">🔗</a>` : ''}
                </div>
                <div class="markers-grid">
                  ${markers.map(m => this.renderMarkerCard(m)).join('')}
                </div>
              </div>
            `;
          }).join('');
        } else {
          container.innerHTML = `
            <div class="markers-grid">
              ${filtered.map(m => this.renderMarkerCard(m)).join('')}
            </div>
          `;
        }

        // Add event listeners
        this.attachCardEventListeners();
      }

      renderMarkerCard(marker) {
        const emoji = this.getTypeEmoji(marker.type);
        const name = this.getTypeName(marker.type);
        const isStrikethrough = marker.type === 'strikethrough';
        const hostname = marker.url ? this.getHostname(marker.url) : '';
        
        return `
          <div class="marker-card type-${marker.type}" data-marker-id="${marker.id}" data-marker-url="${this.escapeHtml(marker.url || '')}">
            <div class="card-header">
              <div class="card-type-badge">${emoji} ${name}</div>
              <div class="card-actions">
                ${marker.url ? `<button class="card-action-btn" data-action="open" title="Open page">🔗</button>` : ''}
                <button class="card-action-btn" data-action="copy" title="Copy">📋</button>
                <button class="card-action-btn delete" data-action="delete" title="Delete">🗑️</button>
              </div>
            </div>
            <div class="card-text${isStrikethrough ? ' strikethrough' : ''}">${this.escapeHtml(marker.text)}</div>
            ${marker.note ? `<div style="font-size: 13px; padding: 10px; background: rgba(149,225,211,0.2); border-radius: 6px; margin-top: 10px; font-style: italic;">📝 ${this.escapeHtml(marker.note)}</div>` : ''}
            <div class="card-meta">
              <span>${marker.dateString || new Date(marker.timestamp).toLocaleString()}</span>
              ${marker.url ? `<div class="card-url"><button class="url-link-btn" data-action="open-url" title="Open page">${hostname} 🔗</button></div>` : ''}
            </div>
          </div>
        `;
      }

      getHostname(url) {
        try {
          return new URL(url).hostname;
        } catch (error) {
          return 'Unknown';
        }
      }

      attachCardEventListeners() {
        // 处理卡片操作按钮
        document.querySelectorAll('.card-action-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            const card = btn.closest('.marker-card');
            const markerId = card.dataset.markerId;
            const markerUrl = card.dataset.markerUrl;
            const marker = this.markers.find(m => m.id === markerId);

            switch(action) {
              case 'open':
                this.openLink(markerUrl);
                break;
              case 'copy':
                this.copyMarker(marker);
                break;
              case 'delete':
                this.deleteMarker(markerId, card);
                break;
            }
          });
        });

        // 处理URL链接按钮
        document.querySelectorAll('.url-link-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const card = btn.closest('.marker-card');
            const markerUrl = card?.dataset.markerUrl;
            if (markerUrl) {
              this.openLink(markerUrl);
            }
          });
        });

        // 处理URL分组头部的链接
        document.querySelectorAll('.url-group-header a').forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const url = link.getAttribute('href');
            if (url) {
              this.openLink(url);
            }
          });
        });
      }

      openLink(url) {
        if (!url || url === 'undefined') {
          this.showNotification('⚠️ No URL available');
          return;
        }
        
        try {
          // 尝试使用 chrome.tabs API（在扩展页面中可用）
          if (chrome.tabs && chrome.tabs.create) {
            chrome.tabs.create({ url: url, active: true });
            this.showNotification('🔗 Opening page...');
          } else {
            // 降级方案：使用 window.open
            window.open(url, '_blank', 'noopener,noreferrer');
            this.showNotification('🔗 Page opened in new tab');
          }
        } catch (error) {
          console.error('Failed to open link:', error);
          // 最后的降级方案
          window.location.href = url;
        }
      }

      copyMarker(marker) {
        const text = marker.note ? `${marker.text}\n\n📝 ${marker.note}` : marker.text;
        navigator.clipboard.writeText(text).then(() => {
          this.showNotification('📋 Copied to clipboard!');
        });
      }

      deleteMarker(markerId, cardElement) {
        if (!confirm('Delete this marker?')) return;

        this.markers = this.markers.filter(m => m.id !== markerId);
        chrome.storage.sync.set({ markers: this.markers }, () => {
          cardElement.style.animation = 'fadeOut 0.3s ease';
          setTimeout(() => {
            this.updateStats();
            this.renderMarkers();
            this.showNotification('🗑️ Marker deleted');
          }, 300);
        });
      }

      clearAll() {
        chrome.storage.sync.set({ markers: [] }, () => {
          this.markers = [];
          this.updateStats();
          this.renderMarkers();
          this.showNotification('🗑️ All markers cleared');
        });
      }

      exportToMarkdown() {
        if (this.markers.length === 0) {
          alert('No markers to export!');
          return;
        }

        let md = `# 📚 Reading Markers\n\n`;
        md += `> Exported on ${new Date().toLocaleString()}\n`;
        md += `> Total markers: ${this.markers.length}\n\n---\n\n`;

        const grouped = { learned: [], question: [], strikethrough: [] };
        this.markers.forEach(m => {
          const type = (m.type === 'highlight' || m.type === 'important') ? 'learned' : m.type;
          if (grouped[type]) grouped[type].push(m);
        });

        Object.entries(grouped).forEach(([type, markers]) => {
          if (markers.length > 0) {
            md += `## ${this.getTypeEmoji(type)} ${this.getTypeName(type)} (${markers.length})\n\n`;
            markers.forEach((m, i) => {
              const text = type === 'strikethrough' ? `~~${m.text}~~` : m.text;
              md += `### ${i + 1}. ${text}\n\n`;
              if (m.note) md += `> 📝 **Note:** ${m.note}\n\n`;
              if (m.url) md += `**Source:** [${new URL(m.url).hostname}](${m.url})\n\n`;
              md += `*Marked on: ${m.dateString || new Date(m.timestamp).toLocaleString()}*\n\n---\n\n`;
            });
          }
        });

        this.downloadFile(md, `reading-markers-${Date.now()}.md`, 'text/markdown');
        this.showNotification('💾 Exported as Markdown!');
      }

      exportToJSON() {
        if (this.markers.length === 0) {
          alert('No markers to export!');
          return;
        }

        const data = {
          version: '1.0',
          exportDate: new Date().toISOString(),
          totalMarkers: this.markers.length,
          markers: this.markers
        };

        this.downloadFile(JSON.stringify(data, null, 2), `markers-backup-${Date.now()}.json`, 'application/json');
        this.showNotification('💾 Exported as JSON!');
      }

      async importFromJSON(file) {
        if (!file) return;

        try {
          const text = await file.text();
          const data = JSON.parse(text);

          if (!data.markers || !Array.isArray(data.markers)) {
            throw new Error('Invalid JSON format');
          }

          const existingIds = new Set(this.markers.map(m => m.id));
          const newMarkers = data.markers.filter(m => !existingIds.has(m.id));

          if (newMarkers.length === 0) {
            this.showNotification('ℹ️ No new markers to import');
            return;
          }

          this.markers = [...this.markers, ...newMarkers];
          chrome.storage.sync.set({ markers: this.markers }, () => {
            this.updateStats();
            this.renderMarkers();
            this.showNotification(`✅ Imported ${newMarkers.length} markers!`);
          });
        } catch (error) {
          alert(`Failed to import: ${error.message}`);
        }
      }

      downloadFile(content, filename, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      getTypeEmoji(type) {
        const emojis = { learned: '💡', question: '❓', strikethrough: '✂️', highlight: '💡', important: '💡' };
        return emojis[type] || '💡';
      }

      getTypeName(type) {
        const names = { learned: 'Learned', question: 'Question', strikethrough: 'Delete', highlight: 'Learned', important: 'Learned' };
        return names[type] || 'Learned';
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      showNotification(message) {
        const toast = document.createElement('div');
        toast.style.cssText = `
          position: fixed; bottom: 30px; right: 30px; z-index: 10000;
          background: linear-gradient(145deg, #D4A017, #B8860B);
          color: white; padding: 16px 24px; border-radius: 12px;
          box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
          font-weight: 600; font-size: 14px;
          animation: slideInRight 0.3s ease;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.animation = 'fadeOut 0.3s ease';
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }
    }

    // Initialize
    const historyManager = new HistoryManager();
  </script>

  <style>
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</body>
</html>
